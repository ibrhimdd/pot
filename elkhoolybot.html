<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مرشد الكلية الذكي</title>
</head>

<body style="text-align:center;margin-top:80px">

<h2>🎓 مرشد الكلية الذكي</h2>

<button id="start">ابدأ التحدث</button>
<button id="stop">إنهاء</button>

<p id="status">الحالة: متوقف</p>

<script type="module">

import Vapi from "https://unpkg.com/@vapi-ai/web?module";

// ✅ Public Key
const vapi = new Vapi(
  "d4fd3957-f837-4575-9559-c04fd27c96e5"
);

// ✅ Assistant
const assistantId =
"ec5dc0db-b781-446c-be4f-34516bb58e92";


document.getElementById("start").onclick = async () => {
  await vapi.start(assistantId);
  document.getElementById("status").innerText="🎙️ يعمل الآن";
};

document.getElementById("stop").onclick = () => {
  vapi.stop();
  document.getElementById("status").innerText="تم الإيقاف";
};

vapi.on("call-start",()=>console.log("started"));
vapi.on("call-end",()=>console.log("ended"));

</script>

</body>
</html>
