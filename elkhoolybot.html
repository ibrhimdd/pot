<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مرشد الكلية الذكي</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:80px;
}

button{
    padding:15px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>🎓 مرشد الكلية الذكي</h2>

<button id="start">ابدأ التحدث</button>
<button id="stop">إنهاء المكالمة</button>

<p id="status">الحالة: متوقف</p>

<script type="module">

// ✅ الاستيراد الصحيح
import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web/dist/index.js";

const vapi = new Vapi("d4fd3957-f837-4575-9559-c04fd27c96e5");

const assistantId =
"ec5dc0db-b781-446c-be4f-34516bb58e92";

document.getElementById("start").addEventListener("click", async () => {
    try{
        await vapi.start(assistantId);
        document.getElementById("status").innerText="🎙️ البوت يعمل الآن";
    }catch(e){
        console.error(e);
    }
});

document.getElementById("stop").addEventListener("click", () => {
    vapi.stop();
    document.getElementById("status").innerText="تم الإيقاف";
});

vapi.on("call-start", () => console.log("Started"));
vapi.on("call-end", () => console.log("Ended"));

</script>

</body>
</html>
