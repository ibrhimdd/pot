<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مرشد الكلية الذكي</title>

<script src="https://cdn.vapi.ai/sdk.js"></script>

<style>
body{
    font-family: Arial;
    text-align:center;
    margin-top:80px;
}

button{
    padding:15px 25px;
    font-size:18px;
    margin:10px;
    cursor:pointer;
}
</style>

</head>

<body>

<h2>🎓 مرشد الكلية الذكي</h2>

<button onclick="startCall()">ابدأ التحدث</button>
<button onclick="stopCall()">إنهاء المكالمة</button>

<p id="status">الحالة: متوقف</p>

<script>

const vapi = window.vapiSDK.run({
  apiKey: "d4fd3957-f837-4575-9559-c04fd27c96e5"
});

const assistantId =
"ec5dc0db-b781-446c-be4f-34516bb58e92";

async function startCall(){
  await vapi.start(assistantId);
  document.getElementById("status").innerText="🎙️ البوت يعمل الآن";
}

function stopCall(){
  vapi.stop();
  document.getElementById("status").innerText="تم الإيقاف";
}

</script>

</body>
</html>
