<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مرشد الكلية الذكي</title>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
    padding-top:80px;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

.start{ background:#28a745;color:white;}
.stop{ background:#dc3545;color:white;}
</style>

</head>

<body>

<h1>🎓 مرشد الكلية الذكي</h1>

<button onclick="startCall()" class="start">ابدأ التحدث</button>
<button onclick="stopCall()" class="stop">إنهاء المكالمة</button>

<p id="status">الحالة: متوقف</p>

<script type="module">

import Vapi from "https://cdn.jsdelivr.net/npm/@vapi-ai/web/+esm";

// ✅ Public Key
const vapi = new Vapi("d4fd3957-f837-4575-9559-c04fd27c96e5");

// ✅ Assistant ID
const assistantId = "ec5dc0db-b781-446c-be4f-34516bb58e92";

window.startCall = async () => {
    try{
        await vapi.start(assistantId);
        document.getElementById("status").innerText="🎙️ البوت يعمل...";
    }catch(e){
        console.error(e);
        alert("حصل خطأ — افتح Console");
    }
}

window.stopCall = () => {
    vapi.stop();
    document.getElementById("status").innerText="⛔ تم الإيقاف";
}

// Events
vapi.on("call-start", () => console.log("Started"));
vapi.on("call-end", () => console.log("Ended"));

</script>

</body>
</html>
