<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مرشد الكلية الذكي</title>

<style>
body{
    font-family: Arial;
    text-align:center;
    padding-top:80px;
}

button{
    padding:15px 25px;
    font-size:18px;
    margin:10px;
}
</style>
</head>

<body>

<h2>🎓 مرشد الكلية الذكي</h2>

<button id="start">ابدأ التحدث</button>
<button id="stop">إنهاء</button>

<p id="status">متوقف</p>

<script type="module">

import { Vapi } from "https://cdn.jsdelivr.net/npm/@vapi-ai/web/+esm";

// ✅ Public Key
const vapi = new Vapi({
  apiKey: "d4fd3957-f837-4575-9559-c04fd27c96e5"
});

// ✅ Assistant ID
const assistantId =
"ec5dc0db-b781-446c-be4f-34516bb58e92";


document.getElementById("start").onclick = async () => {
  try {
    await vapi.start(assistantId);
    document.getElementById("status").innerText="🎙️ البوت يعمل";
  } catch(err){
    console.error(err);
  }
};

document.getElementById("stop").onclick = () => {
  vapi.stop();
  document.getElementById("status").innerText="تم الإيقاف";
};


// Events
vapi.on("call-start", () => console.log("Call started"));
vapi.on("call-end", () => console.log("Call ended"));

</script>

</body>
</html>
