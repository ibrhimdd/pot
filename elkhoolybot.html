<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>مرشد الكلية الذكي</title>

<script src="https://unpkg.com/@vapi-ai/web/dist/vapi.js"></script>

<style>
body{
    font-family: Arial;
    background:#f4f6f9;
    text-align:center;
    padding-top:80px;
}

h1{
    color:#333;
}

button{
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin:10px;
}

.start{
    background:#28a745;
    color:white;
}

.stop{
    background:#dc3545;
    color:white;
}

#status{
    margin-top:20px;
    font-size:20px;
}
</style>

</head>

<body>

<h1>🎓 مرشد الكلية الذكي</h1>

<button class="start" onclick="startCall()">ابدأ التحدث</button>
<button class="stop" onclick="stopCall()">إنهاء المكالمة</button>

<p id="status">الحالة: متوقف</p>

<script>

// ✅ Public Key
const vapi = new Vapi("d4fd3957-f837-4575-9559-c04fd27c96e5");

// ✅ Assistant ID
const assistantId = "ec5dc0db-b781-446c-be4f-34516bb58e92";

function startCall(){
    vapi.start(assistantId);
    document.getElementById("status").innerText = "🎙️ البوت يعمل الآن...";
}

function stopCall(){
    vapi.stop();
    document.getElementById("status").innerText = "⛔ تم إنهاء المكالمة";
}

// Events
vapi.on("call-start", () => {
    console.log("Call Started");
});

vapi.on("call-end", () => {
    console.log("Call Ended");
});

vapi.on("speech-start", () => {
    console.log("Assistant Speaking");
});

vapi.on("speech-end", () => {
    console.log("Assistant Finished");
});

</script>

</body>
</html>
